version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: volleyball-postgres-dev
    environment:
      POSTGRES_DB: volleyball
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: volleyball-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data

  minio:
    image: minio/minio:latest
    container_name: volleyball-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_dev:/data

volumes:
  postgres_data_dev:
  redis_data_dev:
  minio_data_dev: